    <section class="registro">

        <h1>Registro del huerto</h1>

        <p class="intro">

            Lleva un seguimiento del crecimiento de tus cultivos,
            registra cambios, agrega fotografías y escribe observaciones
            importantes sobre el desarrollo de tus plantas.

        </p>

        <!-- FORMULARIO -->

        <div class="formulario">

            <label>Nombre del cultivo</label>

            <input type="text" id="cultivo" placeholder="Ejemplo: tomate">

            <label>Fecha del registro</label>

            <input type="date" id="fecha">

            <label>Estado de la planta</label>

            <select id="estado">

                <option>Germinación</option>
                <option>Crecimiento</option>
                <option>Floración</option>
                <option>Cosecha</option>

            </select>

            <label>Altura aproximada</label>

            <input type="text" id="altura" placeholder="Ejemplo: 15 cm">

            <label>Observaciones</label>

            <textarea id="notas" placeholder="Escribe aquí los cambios observados..."></textarea>

            <label>Agregar fotografía</label>

            <input type="file" id="imagen" accept="image/*">

            <button onclick="guardarRegistro()">
                Guardar registro
            </button>

        </div>

        <!-- RESULTADOS -->

        <div id="contenedor"></div>

    </section>

    <script src="registro.js"></script>

</body>
